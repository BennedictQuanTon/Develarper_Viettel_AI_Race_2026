# Local/dev compose.
# - profile `mock`: CPU stub for API smoke
# - profile `gpu`: team image / vLLM (needs NVIDIA + baked or mounted /model)

services:
  mock:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts:ro
    command: ["python", "scripts/mock_openai_server.py", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    profiles: ["mock"]

  model:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=32768
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
    ports:
      - "8000:8000"
    shm_size: "2g"
    gpus: all
    profiles: ["gpu"]
