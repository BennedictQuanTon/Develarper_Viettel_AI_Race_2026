# Base: vllm/vllm-openai:v0.25.1 | Image: longquanton/develarper-lfm25:p2-fi
# Stack: Z1 FlashMamba — FP8 + FP8 KV + Chunked (512) + Prefix + FlashInfer Mamba + Mamba Cache Align
# Target ERS: ~78-83 | Previous best: 59.57 (E2-Safe, bt=1024, no flashinfer)
# Key unlocks vs E2-Safe:
#   --mamba-backend=flashinfer  → native SSM kernel (p2-fi has flashinfer-python pre-installed)
#   --mamba-cache-mode=align    → cache Mamba SSM state at block boundaries (shared 1000-tok prefix)
#   --max-num-batched-tokens=512 → decode xen kẽ dày hơn → TBT 4ms → ~2ms

services:
  model:
    image: longquanton/develarper-lfm25:p2-fi
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=32768
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --quantization=fp8
      - --kv-cache-dtype=fp8
      - --enable-chunked-prefill
      - --max-num-batched-tokens=512
      - --mamba-backend=flashinfer
      - --mamba-cache-mode=align
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
