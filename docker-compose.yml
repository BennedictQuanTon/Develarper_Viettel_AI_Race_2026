# =============================================================================
# PORTAL SUBMIT FILE — copy/rename to docker-compose.yml when uploading
# =============================================================================
# Before submit:
#   1) make download-model && make build && make push IMAGE_REPO=<you>/develarper-lfm25
#   2) set image: below to that public tag (prefer digest pin)
#   3) keep entrypoint exactly as BTC sample (python3 -m vllm.entrypoints.openai.api_server)
#
# Default image base: CUDA13 vLLM (LFM2.5 needs >=0.23). Do NOT use v0.22.1 unless verified.

services:
  model:
    image: longquanton/develarper-lfm25:p0
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=32768
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --disable-log-requests
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
