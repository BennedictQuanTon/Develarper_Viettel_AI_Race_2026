# E2-Safe (vLLM v0.25.1 Image) — Max ERS & 0% Boot Risk
# Base: vllm/vllm-openai:v0.25.1 | Image: longquanton/develarper-lfm25:p1-v25
# Stack: FP8 Weights + FP8 KV Cache + Chunked Prefill (1024) + Prefix Caching

services:
  model:
    image: longquanton/develarper-lfm25:p1-v25
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=32768
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --quantization=fp8
      - --kv-cache-dtype=fp8
      - --enable-chunked-prefill
      - --max-num-batched-tokens=1024
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
