# S1S2 one-shot (2026-07-21 last daily submit) — same as root docker-compose.yml
# Rationale: workload peak ~4.4k → maxlen 8192 frees KV; bt=2048 prioritizes decode/TPOT
# (TTFT still has huge headroom vs 400ms ceiling). Same image p0 — no rebuild.
services:
  model:
    image: longquanton/develarper-lfm25:p0
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=8192
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --max-num-batched-tokens=2048
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
