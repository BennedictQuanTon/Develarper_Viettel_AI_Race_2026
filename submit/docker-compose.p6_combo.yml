# COMBINED submit — image :p6-sf8-aot (static FP8 weights + AOT caches if baked)
# ONLY after: docker pull longquanton/develarper-lfm25:p6-sf8-aot
#
# CLI ≈ Yoshio #10 but:
#   - NO --quantization=fp8  → checkpoint is already compressed-tensors FP8
#   - keep kv-fp8 + flashinfer + align + bt=512 + block32 + maxlen 8192
#   - NO environment OMP pin (Z3-ENV 58.34 rejected)
#   - NO speculative / bt=256 / max-num-seqs

services:
  model:
    image: longquanton/develarper-lfm25:p6-sf8-aot
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=8192
      - --gpu-memory-utilization=0.96
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --kv-cache-dtype=fp8
      - --enable-chunked-prefill
      - --max-num-batched-tokens=512
      - --block-size=32
      - --mamba-backend=flashinfer
      - --mamba-cache-mode=align
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
