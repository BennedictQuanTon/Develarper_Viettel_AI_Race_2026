# Z1 FlashMamba — Optimal Config | Target ERS ~78-83
# Submit: 2026-07-23 | Image: longquanton/develarper-lfm25:p1-v25 (vLLM v0.25.1)
#
# Unlocks vs E2-Safe (59.57):
#   1. --mamba-backend=flashinfer  → native FlashInfer SSM kernels cho LFM2 hybrid layers
#      (v0.23.0 boot-fail → v0.25.1 STABLE, auto-dispatch qua ssu_dispatch.py)
#   2. --mamba-cache-mode=align    → cache Mamba SSM state tại block boundaries
#      (align với KV cache prefix caching, required chunked-prefill đã có)
#      → shared 1000-token prefix được cache FULL (KV + SSM state)
#   3. --max-num-batched-tokens=512 → giảm từ 1024
#      → decode 70 seqs xen kẽ dày hơn → TBT 4ms → ~2ms
#
# Expected: TBT ~2ms, fail 5→0-2, ERS ~78-83

services:
  model:
    image: longquanton/develarper-lfm25:p1-v25
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=32768
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --quantization=fp8
      - --kv-cache-dtype=fp8
      - --enable-chunked-prefill
      - --max-num-batched-tokens=512
      - --mamba-backend=flashinfer
      - --mamba-cache-mode=align
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
