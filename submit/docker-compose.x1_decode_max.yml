# ARCHIVE — X1 FAILED Portal protocol probe (do NOT resubmit)
# Error: long-context probe failed (0%) - truncation / dual-path likely
# Suspected: --speculative-config ngram and/or -O3 / interactivity under BTC probe
# Keep for analysis only.

services:
  model:
    image: longquanton/develarper-lfm25:p0
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=32768
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --optimization-level=3
      - --performance-mode=interactivity
      - '--speculative-config={"method":"ngram","num_speculative_tokens":5,"prompt_lookup_max":4}'
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
