# X1 Decode-Max — ambitious Δ-safe package (next Portal submit)
# Learnings: P0=49.81 champion · S1S2=48.45 (maxlen/bt không đụng TBT) → đổi lớp đòn bẩy
# Keep BF16 weights (no FP8) → Accuracy Gate / f(Δ) ưu tiên
# All flags verified on vLLM 0.23 engine_args (NOT --disable-log-requests)
#
# Same image: longquanton/develarper-lfm25:p0 — no rebuild required

services:
  model:
    image: longquanton/develarper-lfm25:p0
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=32768
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --optimization-level=3
      - --performance-mode=interactivity
      - '--speculative-config={"method":"ngram","num_speculative_tokens":5,"prompt_lookup_max":4}'
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
