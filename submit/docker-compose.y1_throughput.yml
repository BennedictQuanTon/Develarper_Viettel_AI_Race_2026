# Y1 Throughput Stack — Wave 2 next submit (probe-safe, no speculative)
# Insight: S1S2 bt=2048 failed to move TBT → use bt=16384 + throughput (docs: >8192 for small models)
# X1 ngram failed long-context probe → banned. maxlen MUST stay 32768.
# Image: longquanton/develarper-lfm25:p0 (no rebuild)

services:
  model:
    image: longquanton/develarper-lfm25:p0
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=32768
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --optimization-level=3
      - --performance-mode=throughput
      - --max-num-batched-tokens=16384
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
