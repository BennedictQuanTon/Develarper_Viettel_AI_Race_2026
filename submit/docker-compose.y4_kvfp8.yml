# Y4 — KV-FP8 on P0 or on Y1 winner flags (edit image/flags to match best BF16)
# Usually small Δ; test after Y1/Y2.

services:
  model:
    image: longquanton/develarper-lfm25:p0
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=32768
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --optimization-level=3
      - --performance-mode=throughput
      - --max-num-batched-tokens=16384
      - --kv-cache-dtype=fp8
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
