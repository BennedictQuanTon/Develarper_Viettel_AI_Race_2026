# E2 — E1+ proven FP8 stack + O3 + mamba flashinfer (Δ-safe; no speculative)
# E1+ Portal: Score 59.57 · tbt 4ms (was 6) · fail still 7
# Goal: push TBT toward ~3ms → Score ~65–72; stretch path to 80 needs ~2ms later
# Image: longquanton/develarper-lfm25:p0

services:
  model:
    image: longquanton/develarper-lfm25:p0
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=32768
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --quantization=fp8
      - --kv-cache-dtype=fp8
      - --optimization-level=3
      - --mamba-backend=flashinfer
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
