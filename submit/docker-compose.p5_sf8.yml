# p5-sf8 SUBMIT — Yoshio #10 gold CLI + offline Static FP8 image
# ONLY after: docker pull longquanton/develarper-lfm25:p5-sf8
#
# vs #10 (61.66):
#   image :p2-fi → :p5-sf8
#   REMOVE --quantization=fp8  (weights already compressed-tensors FP8)
#   KEEP  kv-fp8, prefix, chunked bt=512, flashinfer, align, block32, maxlen 8192, mem 0.96
#   NO environment OMP (Z3-ENV rejected 58.34)
#   NO speculative / bt=256 / max-num-seqs

services:
  model:
    image: longquanton/develarper-lfm25:p5-sf8
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=8192
      - --gpu-memory-utilization=0.96
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --kv-cache-dtype=fp8
      - --enable-chunked-prefill
      - --max-num-batched-tokens=512
      - --block-size=32
      - --mamba-backend=flashinfer
      - --mamba-cache-mode=align
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
