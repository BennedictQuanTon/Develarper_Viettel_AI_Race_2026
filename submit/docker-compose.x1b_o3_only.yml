# X1b — safer follow-up AFTER P0 re-confirm (optional later)
# Only -O3, NO speculative, NO interactivity, maxlen 32768
# Do not submit until P0 recovery submit succeeds if needed.

services:
  model:
    image: longquanton/develarper-lfm25:p0
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=LFM2.5-1.2B-Instruct
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=32768
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --optimization-level=3
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
